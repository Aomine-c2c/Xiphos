name: Build and Release Xiphos

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ "$RUNNER_OS" != "Windows" ]; then
            sed -i.bak '/MetaTrader5/d' requirements.txt || true
          fi
          pip install -r requirements.txt
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller Xiphos.spec
          if [ "$RUNNER_OS" == "Windows" ]; then
            pyinstaller --onefile --hidden-import="uvicorn.logging" --hidden-import="uvicorn.loops" --hidden-import="uvicorn.loops.auto" --hidden-import="uvicorn.protocols" --hidden-import="uvicorn.protocols.http" --hidden-import="uvicorn.protocols.http.auto" --hidden-import="uvicorn.protocols.websockets" --hidden-import="uvicorn.protocols.websockets.auto" --hidden-import="uvicorn.lifespan" --hidden-import="uvicorn.lifespan.on" --hidden-import="uvicorn.lifespan.off" bridge/server.py -n bridge_server
          fi
        shell: bash

      - name: Compile Inno Setup Installer (Windows Only)
        if: runner.os == 'Windows'
        run: iscc setup.iss
        shell: cmd
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Xiphos Release ${{ github.ref_name }}
          body: |
            ## Xiphos Algorithmic Trading Framework 🚀
            
            Welcome to the newest release of Xiphos!
            
            ![Xiphos Banner](https://raw.githubusercontent.com/Aomine-c2c/Xiphos/main/assets/banner.png)
            
            ### ✨ What's New
            - Advanced Textual UI Dashboard with Analytics.
            - Termux and Linux Bridge Support.
            - Universal Installation Scripts.
            
            ### 📥 Installation
            
            **For Termux / Linux / macOS (Bridge Mode):**
            ```bash
            curl -sL https://raw.githubusercontent.com/Aomine-c2c/Xiphos/main/install.sh | bash
            ```
            
            **For Windows (Direct Mode):**
            Download the repository and run `install.bat`, or use the `Xiphos_Setup.exe` installer attached below!
            
          generate_release_notes: true
          files: |
            dist/Xiphos.exe
            dist/Xiphos
            dist/bridge_server.exe
            Output/Xiphos_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
