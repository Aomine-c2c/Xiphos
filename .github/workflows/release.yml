name: Build and Release Xiphos

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
        shell: pwsh

      - name: Build executable with PyInstaller
        run: pyinstaller Xiphos.spec
        shell: pwsh

      - name: Install Inno Setup via Chocolatey
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Inject version into setup.iss
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content setup.iss) -replace 'AppVersion=.*', "AppVersion=$version" | Set-Content setup.iss
          Write-Host "Injected version: $version"
        shell: pwsh

      - name: Compile Inno Setup Installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss'
        shell: pwsh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: Xiphos ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Xiphos Algorithmic Trading Framework ${{ github.ref_name }} 🚀

            ![Xiphos Banner](https://raw.githubusercontent.com/Aomine-c2c/Xiphos/main/assets/banner.png)

            ### 📥 Installation (Windows)
            Download and run `Xiphos_Setup.exe` below. The installer will:
            - Place the executable in `%LocalAppData%\Programs\Xiphos`
            - Add Xiphos to your system PATH (optional)
            - Create a desktop shortcut (optional)

            ### ⚙️ Requirements
            - Windows 10/11 x64
            - MetaTrader 5 installed and running

          files: |
            Output/Xiphos_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
