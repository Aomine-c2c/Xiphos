execution:
  mode: "AUTO" # "AUTO" detects OS. "BRIDGE" forces bridge, "DIRECT" forces Windows native.
  bridge_host: "127.0.0.1"
  bridge_port: 8000

trading:
  timeframe: "M30"
  max_risk_trades: 999
  lot_size: 0.01

magic_numbers:
  scalper: 135001
  runner: 135002

indicators:
  fast_ema: 13
  medium_ema: 50
  slow_sma: 200

session_filter:
  enabled: true
  start_hour: 8
  end_hour: 16
  exempt_groups:
    - group_2_jump_indices
    - group_3_tactical_indices
    - group_4_dex_indices

correlation_groups:
  group_1_soft_commodities:
    - CoffeeRobu
    - Cocoa
    - CoffeeArab
  group_2_jump_indices:
    - Jump 75 Index
    - Jump 10 Index
  group_3_tactical_indices:
    - Gold MACO Short Term Index
    - Silver MACO Short Term Index
    - Silver MACO Long Term Index
    - EURUSD MACO Long Term Index
  group_4_dex_indices:
    - DEX 1500 DOWN Index
  group_5_metals_and_spreads:
    - XAUUSD.s
    - XAUUSD
    - XAUEUR
    - XAGEUR
    - XAGUSD

logging:
  level: "INFO"
  rotation: "10 MB"
  retention: "10 days"

database:
  path: "storage/xiphos.sqlite"
