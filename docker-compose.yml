version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python api_server.py
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XIPHOS_MODE=BRIDGE
      # In Docker on Windows/Mac, host.docker.internal reaches the host OS where bridge server might run
      - BRIDGE_HOST=host.docker.internal
    depends_on:
      - redis
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python worker_engine.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XIPHOS_MODE=BRIDGE
      - BRIDGE_HOST=host.docker.internal
    depends_on:
      - redis
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
