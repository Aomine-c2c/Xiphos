version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: xiphos_api
    command: ["python", "api_server.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XIPHOS_DATABASE_URL=postgresql://xiphos:securepass@postgres:5432/xiphos
      - XIPHOS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: xiphos_web
    environment:
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_WS_URL=
    depends_on:
      - api
    restart: unless-stopped

  engine:
    build: 
      context: .
      dockerfile: Dockerfile.engine
    container_name: xiphos_engine
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XIPHOS_DATABASE_URL=postgresql://xiphos:securepass@postgres:5432/xiphos
    volumes:
      - "C:/Program Files/MetaTrader 5:/home/wineuser/.wine/drive_c/Program Files/MetaTrader 5"
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xiphos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: xiphos_postgres
    environment:
      - POSTGRES_USER=xiphos
      - POSTGRES_PASSWORD=securepass
      - POSTGRES_DB=xiphos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: xiphos_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: xiphos_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: xiphos_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
