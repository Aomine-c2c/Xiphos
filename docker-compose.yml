version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: xiphos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xiphos
    ports:
      - "5432:5432"
    volumes:
      - xiphos_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  xiphos_pgdata:
